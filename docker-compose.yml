services:
  nginx:
    image: nginx:latest
    container_name: frontend
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./frontend:/usr/share/nginx/html
    depends_on:
      - backend
    networks:
      - app-network

  backend:
    build: ./backend
    deploy:
      replicas: 2
    environment:
      DB_MASTER: db-master
      DB_SLAVE: db-slave
    depends_on:
      db-master:
        condition: service_healthy
    networks:
      - app-network

  db-master:
    image: mysql:8.0
    container_name: db-master
    volumes:
      - ./mysql-master/master.cnf:/etc/mysql/conf.d/master.cnf
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: app_db
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost", "-ppassword"]
      timeout: 10s
      retries: 10
    networks:
      - app-network

  db-slave:
    image: mysql:8.0
    volumes:
      - ./mysql-slave/slave.cnf:/etc/mysql/conf.d/slave.cnf
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    environment:
      MYSQL_DATABASE: app_db
      MYSQL_ROOT_PASSWORD: password
    networks:
      - app-network

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:latest
    container_name: nginx-stats
    command:
      - -nginx.scrape-uri=http://nginx:80/nginx_status
    ports:
      - "9113:9113"
    depends_on:
      - nginx
    networks:
      - app-network

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - app-network

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
