services:
  nginx:
    image: nginx:latest
    container_name: frontend
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./frontend:/usr/share/nginx/html
    depends_on:
      - backend
    networks:
      - app-network

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    image: db-autoscaling-docker-backend
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
    environment:
      DB_MASTER: db-master
      DB_SLAVE: db-slave
      HOST: 0.0.0.0 
    depends_on:
      db-master:
        condition: service_healthy
      db-slave:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 5s 
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - app-network

  db-master:
    image: mysql:8.0
    container_name: db-master
    volumes:
      - ./mysql-master/master.cnf:/etc/mysql/conf.d/master.cnf
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: app_db
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost", "-ppassword"]
      interval: 10s
      retries: 5
    networks:
      - app-network

  db-slave:
    image: mysql:8.0
    volumes:
      - ./mysql-slave/slave.cnf:/etc/mysql/conf.d/slave.cnf
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    environment:
      MYSQL_DATABASE: app_db
      MYSQL_ROOT_PASSWORD: password
    command: 
      - --innodb-flush-log-at-trx-commit=2
      - --skip-log-bin
      - --sync-binlog=0
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -ppassword || exit 1"]
      interval: 3s        
      timeout: 2s         
      retries: 10        
      start_period: 5s
    networks:
      - app-network

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:latest
    container_name: nginx-stats
    command:
      - -nginx.scrape-uri=http://nginx:80/nginx_status
    ports:
      - "9113:9113"
    depends_on:
      - nginx
    networks:
      - app-network

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - app-network

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_DATASOURCES_DEFAULT_URL=http://prometheus:9090
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
