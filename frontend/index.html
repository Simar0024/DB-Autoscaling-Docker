<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClusterOps | Enterprise Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { border: "hsl(var(--border))", background: "hsl(var(--background))" } } }
        }
    </script>
    <style>
        :root { --background: 210 20% 98%; --card: 0 0% 100%; --primary: 221 83% 53%; --border: 214 32% 91%; }
        .dark { --background: 222 47% 11%; --card: 217 33% 17%; --primary: 217 91% 60%; --border: 217 20% 27%; }
        body { background-color: hsl(var(--background)); transition: all 0.3s ease; }
        .glass-card { background: hsl(var(--card)); border: 1px solid hsl(var(--border)); }
        .traffic-glow { box-shadow: 0 0 20px rgba(59, 130, 246, 0.4); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .animate-node { animation: fadeIn 0.4s ease-out; }
    </style>
</head>
<body class="text-slate-900 dark:text-slate-100 min-h-screen font-sans">

    <nav class="border-b border-slate-200 dark:border-slate-800 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 p-2 rounded-lg text-white"><i class="fas fa-network-wired"></i></div>
                <div>
                    <h1 class="text-xl font-bold tracking-tight">Cluster<span class="text-blue-600">Ops</span></h1>
                    <p class="text-[10px] text-slate-500 uppercase font-bold">Auto-Scaling Logic v3.1</p>
                </div>
            </div>
            <div class="flex items-center gap-6">
                <div class="hidden md:flex gap-4 border-r border-slate-200 dark:border-slate-700 pr-6">
                    <div class="text-right">
                        <span class="block text-[10px] text-slate-400 uppercase font-bold">Latency</span>
                        <span id="load-val" class="text-blue-500 text-xs font-bold tracking-widest">-- ms</span>
                    </div>
                </div>
                <button onclick="document.documentElement.classList.toggle('dark')" class="p-2.5 rounded-full bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-yellow-400">
                    <i class="fas fa-moon dark:hidden"></i><i class="fas fa-sun hidden dark:block"></i>
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6 space-y-8">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <div class="lg:col-span-8 flex flex-col gap-6">
                <div class="glass-card p-6 rounded-2xl flex-1">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest">Cluster Topology</h3>
                        <span id="traffic-status" class="text-emerald-500 text-[10px] font-black uppercase">Optimal</span>
                    </div>
                    <div id="node-topology" class="flex flex-wrap gap-3">
                        </div>
                </div>
            </div>
            
            <div class="lg:col-span-4">
                <div class="glass-card p-6 rounded-2xl h-full flex flex-col items-center">
                    <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4 w-full text-left">Load Distribution</h3>
                    <div class="w-full max-w-[180px]">
                        <canvas id="usageChart"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-4 space-y-6">
                <div class="glass-card p-6 rounded-2xl">
                    <h3 class="text-sm font-bold mb-6 flex items-center gap-2 text-slate-500 uppercase"><i class="fas fa-database"></i> Entry Point</h3>
                    <form id="entryForm" class="space-y-4">
                        <input type="text" id="name" placeholder="User Identity" required class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500">
                        <input type="email" id="email" placeholder="Network Address" required class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500">
                        <textarea id="message" rows="2" placeholder="Payload Data..." required class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500"></textarea>
                        <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-xl transition-all shadow-lg shadow-blue-500/20">
                            Push to Master Node
                        </button>
                    </form>
                </div>

                <div class="glass-card p-6 rounded-2xl">
                    <h3 class="text-[11px] font-bold text-slate-400 uppercase mb-4">Live System Logs</h3>
                    <div id="writeLog" class="space-y-2 h-40 overflow-y-auto custom-scrollbar font-mono text-[9px]"></div>
                </div>
            </div>

            <div class="lg:col-span-8">
                <div id="table-container" class="glass-card rounded-2xl overflow-hidden transition-all">
                    <div class="p-4 border-b border-slate-100 dark:border-slate-800 flex justify-between bg-slate-50/50 dark:bg-slate-800/20">
                        <span id="cache-status" class="px-3 py-1 bg-blue-500 text-white rounded text-[9px] font-black uppercase">Syncing...</span>
                        <span class="text-[10px] text-slate-400 font-mono" id="row-count">Records: 0</span>
                    </div>
                    <div class="overflow-x-auto max-h-[500px] custom-scrollbar">
                        <table class="w-full text-left">
                            <thead class="sticky top-0 bg-white dark:bg-slate-900 text-[10px] text-slate-400 uppercase">
                                <tr>
                                    <th class="px-6 py-4">Ref</th>
                                    <th class="px-6 py-4">Served By</th>
                                    <th class="px-6 py-4">Identity</th>
                                    <th class="px-6 py-4">Payload</th>
                                    <th class="px-6 py-4 text-right">Time</th>
                                </tr>
                            </thead>
                            <tbody id="dataTable" class="text-xs divide-y divide-slate-100 dark:divide-slate-800"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // DOM Elements
        const form = document.getElementById('entryForm'), writeLog = document.getElementById('writeLog'),
              tableBody = document.getElementById('dataTable'), cacheStatus = document.getElementById('cache-status'),
              latencyVal = document.getElementById('load-val'), trafficStatus = document.getElementById('traffic-status'),
              nodeTopology = document.getElementById('node-topology'), tableContainer = document.getElementById('table-container');

        // Global State
        let lastSeenId = 0;
        let nodeUsageData = {}; // Format: { "node-id": requestCount }
        let usageChart;

        // Initialize Chart
        function initChart() {
            const ctx = document.getElementById('usageChart').getContext('2d');
            usageChart = new Chart(ctx, {
                type: 'doughnut',
                data: { labels: [], datasets: [{ data: [], backgroundColor: ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6'] }] },
                options: { plugins: { legend: { display: false } }, cutout: '70%', responsive: true }
            });
        }

        function updateChart(nodeId) {
            nodeUsageData[nodeId] = (nodeUsageData[nodeId] || 0) + 1;
            usageChart.data.labels = Object.keys(nodeUsageData);
            usageChart.data.datasets[0].data = Object.values(nodeUsageData);
            usageChart.update();
            renderNodeBadges(nodeId);
        }

        function renderNodeBadges(currentNode, metrics = {}) {
    nodeTopology.innerHTML = Object.keys(nodeUsageData).map(node => {
        const isCurrent = node === currentNode;
        const cpu = metrics.cpu || "0%";
        const mem = metrics.memory || "0%";

        return `
            <div class="px-4 py-3 rounded-xl border flex flex-col gap-1 transition-all animate-node 
                ${isCurrent ? 'border-blue-500 bg-blue-50 dark:bg-blue-900/20 shadow-sm' : 'border-slate-200 dark:border-slate-700'}">
                <div class="flex items-center gap-2">
                    <div class="w-2 h-2 rounded-full ${isCurrent ? 'bg-blue-500 animate-pulse' : 'bg-slate-300'}"></div>
                    <span class="text-xs font-mono font-black">${node}</span>
                </div>
                <div class="flex gap-3 mt-1">
                    <div class="flex flex-col">
                        <span class="text-[8px] text-slate-400 uppercase font-bold">CPU</span>
                        <span class="text-[10px] font-bold ${parseFloat(cpu) > 70 ? 'text-red-500' : 'text-slate-600'}">${cpu}</span>
                    </div>
                    <div class="flex flex-col">
                        <span class="text-[8px] text-slate-400 uppercase font-bold">RAM</span>
                        <span class="text-[10px] font-bold text-slate-600">${mem}</span>
                    </div>
                    <div class="flex flex-col border-l pl-2 border-slate-200">
                        <span class="text-[8px] text-slate-400 uppercase font-bold">Reqs</span>
                        <span class="text-[10px] font-bold text-blue-600">${nodeUsageData[node]}</span>
                    </div>
                </div>
            </div>
        `;
    }).join('');
}

        function addLogEntry(type, msg, isErr = false) {
            const entry = document.createElement('div');
            entry.className = `p-2 rounded border mb-1 ${isErr ? 'bg-red-50 border-red-100 text-red-600' : 'bg-blue-50 border-blue-100 text-blue-600 dark:bg-blue-900/10'}`;
            entry.innerHTML = `<span class="opacity-50">[${new Date().toLocaleTimeString()}]</span> <b>${type}:</b> ${msg}`;
            writeLog.prepend(entry);
            if (writeLog.children.length > 8) writeLog.lastElementChild.remove();
        }

        async function fetchData() {
            const start = Date.now();
            try {
                const res = await fetch(`/api/data?t=${Date.now()}`); // Cache busting
                if (!res.ok) throw new Error();
                const result = await res.json();
                
                latencyVal.innerText = `${Date.now() - start}ms`;
                cacheStatus.innerText = `Node: ${result.served_by}`;
                
                updateChart(result.served_by);
		renderNodeBadges(result.served_by, result.metrics || {});

                if (result.data.length > 0) {
                    const topId = result.data[0].id;
                    if (topId > lastSeenId) {
                        if(lastSeenId !== 0) {
                            addLogEntry("SYNC", `Injected ${topId - lastSeenId} rows`);
                            tableContainer.classList.add('traffic-glow');
                            trafficStatus.innerText = "🔥 High Traffic";
                            trafficStatus.className = "text-orange-500 text-[10px] font-black uppercase animate-bounce";
                        }
                        
                        tableBody.innerHTML = result.data.map(item => `
                            <tr class="hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
                                <td class="px-6 py-4 font-mono text-blue-500">#${item.id}</td>
                                <td class="px-6 py-4"><span class="bg-slate-100 dark:bg-slate-700 px-2 py-0.5 rounded text-[10px] font-mono">${result.served_by}</span></td>
                                <td class="px-6 py-4"><b>${item.name}</b><br><span class="text-[10px] opacity-60">${item.email}</span></td>
                                <td class="px-6 py-4 italic text-slate-500">"${item.message}"</td>
                                <td class="px-6 py-4 text-right opacity-60">${new Date(item.created_at).toLocaleTimeString()}</td>
                            </tr>
                        `).join('');
                        lastSeenId = topId;
                        document.getElementById('row-count').innerText = `Records: ${result.data.length}`;
                    } else {
                        trafficStatus.innerText = "Optimal";
                        trafficStatus.className = "text-emerald-500 text-[10px] font-black uppercase";
                        tableContainer.classList.remove('traffic-glow');
                    }
                }
            } catch (err) {
                cacheStatus.innerText = "⚠️ Offline";
                cacheStatus.className = "px-3 py-1 bg-red-600 text-white rounded text-[9px] font-black uppercase";
            }
        }

        form.onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true; btn.innerText = "Broadcasting...";
            try {
                const res = await fetch('/api/data', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        name: document.getElementById('name').value,
                        email: document.getElementById('email').value,
                        message: document.getElementById('message').value
                    })
                });
                const r = await res.json();
                addLogEntry("COMMIT", `Verified by Master`);
                form.reset();
                fetchData();
            } catch (err) { addLogEntry("ERR", "Broadcast Failed", true); }
            finally { btn.disabled = false; btn.innerText = "Push to Master Node"; }
        };

        initChart();
        setInterval(fetchData, 1200);
        window.onload = fetchData;
    </script>
</body>
</html>
